<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        textarea{
            width: 200px;
            height: 400px;
        }
        .box1{
            resize: vertical;
        }
        .box2{
            resize: horizontal;
        }
        .box3{
            resize: none;
        }
    </style>
</head>
<body>
    <h1>这是一个文本域</h1>
    <textarea class="box1"></textarea><br>
    <h1>第二个问题</h1>
    <textarea placeholder="这是背景故事" class="box2"></textarea><br>
    <textarea >

    </textarea><br>
    <textarea class="box3">这是默认文本，写在这里亲</textarea><br>
    <textarea >控制大小,亲</textarea><br>
</body>
</html>
