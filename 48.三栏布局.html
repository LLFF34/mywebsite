<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box1{
            background-color: red;
            width: 200px;
            height: 100%;
            float: left;
        }
        .box2{
            background-color: green;
            height: 100%;
            width: calc(100% - 400px);
            float: left;
        }
        .box3{
            background-color: blue;
            width: 200px;
            height: 100%;
            float: right;
        }
        html,body{
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
</body>
</html>
