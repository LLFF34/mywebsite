<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            font-size: 25px;
        }
    </style>
</head>
<body>
    <div>
        <input type="radio" name="diaocha" id="manyi" checked> <!--name在这里的 作用是 指定哪几个选项为一组，id的作用是 为后面的文字做选择效果提供指向 checked是设置默认选项-->
        <label for="manyi">满意</label>
    </div>
    <div>
        <input type="radio" name="diaocha" id="henmanyi">
        <label for="henmanyi">很满意</label>
    </div>
    <div>
        <input type="radio" name="diaocha" id="yiban">
        <label for="yiban">一般</label>
    </div>
    <div>
        <input type="radio" name="diaocha" id="jiaocha">
        <label for="jiaocha">较差</label>
    </div>
</body>
</html>
