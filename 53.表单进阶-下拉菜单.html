<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        请选择你的地址！
        <br>
        <select name="" id="" multiple >
            <option value="上海" selected>上海</option><!--支持value属性，value是提供给后端的值 必填！！！；selected 默认选择-->
            <option value="北京" selected>北京</option>
            <option value="浙江" selected>浙江</option>
            <option value="" selected>江苏</option>
            <option value="">安徽</option>
            <option value="">山东</option>
        </select>
    </div>
</body>
</html>
